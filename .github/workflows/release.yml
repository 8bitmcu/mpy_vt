name: Build and Release Firmware

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version Tag for Manual Release (e.g., v1.0.0-beta)'
        required: true
        default: 'v-manual'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout mpy_vt repository
        uses: actions/checkout@v4
        with:
          path: mpy_vt

      - name: Checkout MicroPython repository
        uses: actions/checkout@v4
        with:
          repository: micropython/micropython
          #ref: v1.22.2
          submodules: 'recursive'
          path: micropython

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev git pkg-config python3 python3-pip python3-virtualenv ccache

      - name: Cache ESP-IDF and Toolchains
        id: cache-esp-idf
        uses: actions/cache@v4
        with:
          path: |
            ~/esp/esp-idf
            ~/.espressif
          key: esp-idf-v5.5.2-v1

      - name: Setup ESP-IDF
        if: steps.cache-esp-idf.outputs.cache-hit != 'true'
        run: |
          mkdir -p $HOME/esp
          cd $HOME/esp
          git clone --recursive -b v5.5.2 https://github.com/espressif/esp-idf.git
          cd esp-idf
          ./install.sh esp32s3

      - name: Setup Compiler Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-esp-idf-${{ github.sha }}
          restore-keys: |
            ccache-esp-idf-

      - name: Prepare Board Definitions and Submodules
        run: |
          cp -r mpy_vt/boards/LILYGO_T_DECK micropython/ports/esp32/boards/
          . $HOME/esp/esp-idf/export.sh
          cd micropython
          make -C ports/esp32 submodules

      - name: Build mpy-cross (MicroPython Cross-Compiler)
        run: |
          cd micropython/mpy-cross
          make

      - name: Compile T-Deck Firmware Binary
        run: |
          cd micropython/ports/esp32
          . $HOME/esp/esp-idf/export.sh
          export MPY_USER_MODULES_DIR="$GITHUB_WORKSPACE/mpy_vt/modules"
          if ! make BOARD=LILYGO_T_DECK CCACHE_ENABLE=1 \
                 USER_C_MODULES=$GITHUB_WORKSPACE/mpy_vt/modules \
                 FROZEN_MANIFEST=$GITHUB_WORKSPACE/mpy_vt/modules/manifest.py; then
              echo "===================================================="
              echo "   COMPILATION FAILED: DUMPING LOG DIRECTORY        "
              echo "===================================================="
              cat build-LILYGO_T_DECK/log/* || true
              exit 1
          fi

      - name: Prepare Release Artifacts
        run: |
          mkdir -p release_assets
          BUILD_DIR=micropython/ports/esp32/build-LILYGO_T_DECK
          cp $BUILD_DIR/firmware.bin release_assets/mpy_vt-${{ github.ref_name }}.bin
          cp $BUILD_DIR/bootloader/bootloader.bin release_assets/bootloader.bin
          cp $BUILD_DIR/partition_table/partition-table.bin release_assets/partition-table.bin
          cd release_assets
          zip -r ../mpy_vt-${{ github.ref_name }}.zip ./*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag || github.ref_name }}
          name: Release ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: |
            mpy_vt-*.zip
            release_assets/mpy_vt-*.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
